# =============================================================================
# CONFIGURACIÓN DE DOCKER COMPOSE PARA APLICACIÓN ANGULAR
# =============================================================================
# Este archivo define los servicios, redes y volúmenes necesarios para ejecutar la
# aplicación Angular en un entorno contenerizado usando Docker Compose.
#
# Características:
# - Orquestación multi-contenedor
# - Mapeo de puertos para acceso local
# - Health checks para monitoreo
# - Políticas de reinicio automático
# - Montaje de volúmenes para logs
# - Configuración de red personalizada
# =============================================================================

# =============================================================================
# DEFINICIÓN DE SERVICIOS
# =============================================================================
# Los servicios son los contenedores que serán creados y gestionados por Docker Compose
# Cada servicio puede tener su propia configuración, dependencias y recursos
services:
  # Servicio backend Spring Boot
  bookshop-springboot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookshop-springboot-app
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DATASOURCE_URL=${DATASOURCE_URL}
      - DATASOURCE_USERNAME=${DATASOURCE_USERNAME}
      - DATASOURCE_PASSWORD=${DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
    ports:
      - '8282:8282'
    networks:
      - bookshop-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8282/actuator/health' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Servicio frontend Angular
  bookshop-angular:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookshop-angular-app
    ports:
      - '8080:80'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs:/var/log/nginx
    networks:
      - bookshop-network
    depends_on:
      bookshop-springboot:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:80' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =============================================================================
  # SERVICIOS DE CI/CD
  # =============================================================================

  # Servicio Jenkins para integración continua
  jenkins:
    image: jenkins/jenkins:lts
    container_name: bookshop-jenkins
    ports:
      - '8081:8080'
      - '50000:50000'
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bookshop-network
    restart: unless-stopped
    healthcheck:
      test: [ 'CMD-SHELL', 'curl -f http://localhost:8080/login || exit 1' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Servicio SonarQube para análisis de calidad de código
  sonarqube:
    image: sonarqube:community
    container_name: bookshop-sonarqube
    ports:
      - '9000:9000'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - bookshop-network
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    depends_on:
      - sonarqube-db
    restart: unless-stopped
    healthcheck:
      test: [ 'CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:9000/api/system/status || exit 1' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Base de datos PostgreSQL para SonarQube (uso interno de SonarQube)
  sonarqube-db:
    image: postgres:15
    container_name: bookshop-sonarqube-db
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    networks:
      - bookshop-network
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    restart: unless-stopped
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U sonar' ]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# DEFINICIÓN DE REDES
# =============================================================================
# Las redes permiten que los contenedores se comuniquen entre sí
# Esto es útil cuando tienes múltiples servicios (app, base de datos, caché, etc.)
networks:
  # =============================================================================
  # RED PERSONALIZADA PARA LA APLICACIÓN
  # =============================================================================
  # Una red personalizada para los servicios de nuestra aplicación
  # Esto proporciona aislamiento y permite descubrimiento de servicios
  bookshop-network:
    # Tipo de driver de red
    # "bridge" es el driver por defecto para redes de un solo host
    # Otras opciones: "host", "overlay", "macvlan", "none"
    driver: bridge

# =============================================================================
# DEFINICIÓN DE VOLÚMENES
# =============================================================================
# Los volúmenes permiten persistir datos entre reinicios de contenedores
# Esto es esencial para Jenkins y SonarQube para mantener configuraciones y datos
volumes:
  # Volumen para datos de Jenkins (configuración, jobs, plugins)
  jenkins_home:
    driver: local

  # Volumen para datos de SonarQube
  sonarqube_data:
    driver: local

  # Volumen para extensiones de SonarQube (plugins)
  sonarqube_extensions:
    driver: local

  # Volumen para logs de SonarQube
  sonarqube_logs:
    driver: local

  # Volumen para base de datos PostgreSQL de SonarQube
  sonarqube_db:
    driver: local

