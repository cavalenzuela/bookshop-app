# Este archivo define los servicios, redes y volúmenes necesarios para ejecutar la
# aplicación Bookshop en un entorno contenerizado usando Docker Compose.
#
# Características:
# - Orquestación multi-contenedor
# - Mapeo de puertos para acceso local
# - Health checks para monitoreo
# - Políticas de reinicio automático
# - Montaje de volúmenes para logs
# - Configuración de red personalizada
# =============================================================================

# =============================================================================
# DEFINICIÓN DE SERVICIOS
# =============================================================================
# Los servicios son los contenedores que serán creados y gestionados por Docker Compose
# Cada servicio puede tener su propia configuración, dependencias y recursos
services:
  # Servicio backend Spring Boot
  bookshop-springboot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookshop-springboot-app
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DATASOURCE_URL=${DATASOURCE_URL}
      - DATASOURCE_USERNAME=${DATASOURCE_USERNAME}
      - DATASOURCE_PASSWORD=${DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - REDIS_HOST=bookshop-redis
      - REDIS_PORT=6379
    ports:
      - '8282:8282'
    networks:
      - bookshop-network
    depends_on:
      bookshop-redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8282/actuator/health' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Servicio frontend Angular
  bookshop-angular:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookshop-angular-app
    ports:
      - '8080:80'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs:/var/log/nginx
    networks:
      - bookshop-network
    depends_on:
      bookshop-springboot:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:80' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Servicio Redis para caché
  bookshop-redis:
    image: redis:7-alpine
    container_name: bookshop-redis
    ports:
      - '6379:6379'
    networks:
      - bookshop-network
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Herramienta visual para Redis
  bookshop-redisinsight:
    image: redis/redisinsight:latest
    container_name: bookshop-redisinsight
    user: root
    ports:
      - '8001:8001'
    networks:
      - bookshop-network
    volumes:
      - redisinsight_data:/db
    environment:
      - RI_APP_HOST=0.0.0.0
      - RI_APP_PORT=8001
    depends_on:
      bookshop-redis:
        condition: service_healthy
    restart: unless-stopped

# =============================================================================
# DEFINICIÓN DE REDES
# =============================================================================
# Las redes permiten que los contenedores se comuniquen entre sí
# Esto es útil cuando tienes múltiples servicios (app, base de datos, caché, etc.)
networks:
  # =============================================================================
  # RED PERSONALIZADA PARA LA APLICACIÓN
  # =============================================================================
  # Una red personalizada para los servicios de nuestra aplicación
  # Esto proporciona aislamiento y permite descubrimiento de servicios
  bookshop-network:
    # Tipo de driver de red
    # "bridge" es el driver por defecto para redes de un solo host
    # Otras opciones: "host", "overlay", "macvlan", "none"
    driver: bridge

# =============================================================================
# DEFINICIÓN DE VOLÚMENES
# =============================================================================
# Los volúmenes permiten persistir datos entre reinicios de contenedores
# Esto es esencial para que los servicios mantengan configuraciones y datos
volumes:
  # Volumen para datos de Redis
  redis_data:
    driver: local

  # Volumen para datos de Redis Insight
  redisinsight_data:
    driver: local

