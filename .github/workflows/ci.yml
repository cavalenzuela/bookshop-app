name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Cumplimiento con políticas de GitHub Actions de 2026

jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    # Servicios necesarios para los tests de integración del backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: bookshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test Backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          DATASOURCE_URL: jdbc:postgresql://localhost:5432/bookshop_test
          DATASOURCE_USERNAME: testuser
          DATASOURCE_PASSWORD: testpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_secret_key_at_least_32_chars_long_for_security_12345
          JWT_EXPIRATION: 3600000
        run: mvn -f backend/pom.xml clean verify jacoco:report

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Analyze with SonarCloud (Backend)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_PROFILES_ACTIVE: dev
          DATASOURCE_URL: jdbc:postgresql://localhost:5432/bookshop_test
          DATASOURCE_USERNAME: testuser
          DATASOURCE_PASSWORD: testpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_secret_key_at_least_32_chars_long_for_security_12345
          JWT_EXPIRATION: 3600000
        run: |
          mvn -f backend/pom.xml sonar:sonar \
            -Dsonar.projectKey=cavalenzuela_bookshop-app-backend \
            -Dsonar.organization=cavalenzuela \
            -Dsonar.host.url=https://sonarcloud.io

  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # Actualizado a Node 24 para cumplimiento de 2026
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build Frontend
        run: npm run build --prefix frontend -- --configuration production

      - name: Run Tests (Headless)
        run: npm test --prefix frontend -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Analyze with SonarCloud (Frontend)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=cavalenzuela_bookshop-app-frontend
            -Dsonar.organization=cavalenzuela
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.javascript.lcov.reportPaths=coverage/frontend/lcov.info
