# Nombre del flujo de trabajo que aparecerá en la pestaña "Actions" de GitHub
name: CI/CD Pipeline

# Definición de los eventos que disparan el pipeline
on:
  push:
    # Se ejecuta cada vez que se suben cambios a la rama master
    branches: [ master ]
  pull_request:
    # Se ejecuta cuando se abre o actualiza un Pull Request hacia master
    branches: [ master ]

# Variables de entorno globales para todo el pipeline
env:
  # Forza el uso de Node 24 para las acciones internas de GitHub, cumpliendo con estándares de 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # =============================================================================
  # TRABAJO 1: Construcción y Pruebas del Backend (Java/Spring Boot)
  # =============================================================================
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest # Sistema operativo del servidor de GitHub
    
    # Definición de contenedores auxiliares necesarios para los tests de integración
    services:
      # Base de datos PostgreSQL real para validar persistencia
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: bookshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      # Servidor Redis real para validar la lógica de caché
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Descarga el código del repositorio al servidor de GitHub
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Descarga todo el historial (necesario para SonarCloud)

      # 2. Instala el kit de desarrollo de Java (JDK) versión 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Cachea dependencias para que la próxima ejecución sea más rápida

      # 3. Compila, ejecuta tests y genera reporte de cobertura con JaCoCo
      - name: Build and Test Backend
        env:
          SPRING_PROFILES_ACTIVE: dev # Activa perfil dev para usar variables de entorno
          DATASOURCE_URL: jdbc:postgresql://localhost:5432/bookshop_test
          DATASOURCE_USERNAME: testuser
          DATASOURCE_PASSWORD: testpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_secret_key_at_least_32_chars_long_for_security_12345
          JWT_EXPIRATION: 3600000
        run: mvn -f backend/pom.xml clean verify jacoco:report

      # 4. Optimiza la caché de SonarCloud
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 5. Envía los resultados del análisis y la cobertura a SonarCloud
      - name: Analyze with SonarCloud (Backend)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Token automático de GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # Token manual configurado en Secrets
          SPRING_PROFILES_ACTIVE: dev
          DATASOURCE_URL: jdbc:postgresql://localhost:5432/bookshop_test
          DATASOURCE_USERNAME: testuser
          DATASOURCE_PASSWORD: testpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_secret_key_at_least_32_chars_long_for_security_12345
          JWT_EXPIRATION: 3600000
        run: |
          mvn -f backend/pom.xml sonar:sonar \
            -Dsonar.projectKey=cavalenzuela_bookshop-app-backend \
            -Dsonar.organization=cavalenzuela \
            -Dsonar.host.url=https://sonarcloud.io

  # =============================================================================
  # TRABAJO 2: Construcción y Pruebas del Frontend (Angular)
  # =============================================================================
  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga el código
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Instala Node.js versión 24 (Estándar de 2026)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Instala las librerías de Angular (node_modules)
      - name: Install dependencies
        run: npm ci --prefix frontend

      # 4. Compila la aplicación para producción (genera carpeta dist)
      - name: Build Frontend
        run: npm run build --prefix frontend -- --configuration production

      # 5. Ejecuta tests unitarios en modo "Headless" (sin abrir ventana de Chrome)
      - name: Run Tests (Headless)
        run: npm test --prefix frontend -- --watch=false --browsers=ChromeHeadless --code-coverage

      # 6. Envía el análisis del frontend a SonarCloud usando el archivo sonar-project.properties
      - name: Analyze with SonarCloud (Frontend)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=cavalenzuela_bookshop-app-frontend
            -Dsonar.organization=cavalenzuela
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.javascript.lcov.reportPaths=coverage/frontend/lcov.info
