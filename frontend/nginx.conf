# CONFIGURACIÓN NGINX PARA APLICACIÓN ANGULAR SPA
# Esta configuración está optimizada para servir Aplicaciones de Página Única (SPAs) de Angular
# Incluye cabeceras de seguridad, compresión, caché y soporte adecuado de rutas.

# BLOQUE DE EVENTOS - CONFIGURACIÓN DE MANEJO DE CONEXIONES
# Configura cómo nginx maneja conexiones y procesos
events {
    # Número máximo de conexiones simultáneas que puede abrir un proceso worker
    # Esto debe configurarse según las capacidades del servidor y la carga esperada
    worker_connections 1024;
}

# BLOQUE HTTP - CONFIGURACIÓN PRINCIPAL DEL SERVIDOR
# Contiene toda la configuración relacionada con HTTP incluyendo servidores, ubicaciones y configuraciones
http {
    # Incluir la configuración de tipos MIME por defecto
    # Esto le dice a nginx cómo manejar diferentes tipos de archivos (HTML, CSS, JS, imágenes, etc.)
    include       /etc/nginx/mime.types;
    
    # Tipo MIME por defecto para archivos que no coinciden con ningún tipo específico
    # application/octet-stream significa que el navegador descargará el archivo
    default_type  application/octet-stream;

    # CONFIGURACIÓN DE LOGGING
    # Define un formato de log personalizado para mejor depuración y monitoreo
    # Este formato incluye IP del cliente, timestamp, detalles de la petición, estado y user agent
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Establecer el archivo de log de acceso y formato
    # Esto registra todas las peticiones a la aplicación para monitoreo y depuración
    access_log /var/log/nginx/access.log main;
    
    # Establecer el archivo de log de errores y nivel
    # Solo se registran advertencias y errores para reducir el tamaño del archivo de log
    error_log /var/log/nginx/error.log warn;

    # OPTIMIZACIONES DE RENDIMIENTO
    # Habilitar sendfile para servir archivos de manera eficiente
    # Esto permite a nginx enviar archivos directamente del disco a la red sin copiar a memoria
    sendfile on;
    
    # Habilitar tcp_nopush para optimizar la transmisión de paquetes
    # Esto envía cabeceras y el inicio de un archivo en un paquete
    tcp_nopush on;
    
    # Deshabilitar el algoritmo de Nagle para mejor rendimiento en tiempo real
    # Esto reduce la latencia para paquetes pequeños
    tcp_nodelay on;
    
    # Establecer timeout de keepalive para conexiones persistentes
    # Esto permite múltiples peticiones sobre la misma conexión, reduciendo sobrecarga
    keepalive_timeout 65;
    
    # Establecer tamaño máximo para tablas hash
    # Esto afecta cómo nginx maneja nombres de servidor y otras búsquedas basadas en hash
    types_hash_max_size 2048;

    # CONFIGURACIÓN DE COMPRESIÓN GZIP
    # Habilitar compresión gzip para reducir el uso de ancho de banda y mejorar tiempos de carga
    gzip on;
    
    # Agregar cabecera Vary para indicar que se usó compresión
    # Esto ayuda con el caché y servidores proxy
    gzip_vary on;
    
    # Tamaño mínimo para compresión (archivos más pequeños que esto no serán comprimidos)
    # Esto previene sobrecarga de compresión para archivos ya pequeños
    gzip_min_length 1024;
    
    # Habilitar compresión para peticiones proxy
    # Esto asegura que la compresión funcione incluso detrás de un proxy
    gzip_proxied any;
    
    # Establecer nivel de compresión (1-9, donde 9 es compresión máxima)
    # El nivel 6 proporciona buena compresión sin uso excesivo de CPU
    gzip_comp_level 6;
    
    # Definir qué tipos de archivo comprimir
    # Esto incluye tipos de archivo web comunes que se benefician de la compresión
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # BLOQUE DE SERVIDOR - SERVIDOR PRINCIPAL DE LA APLICACIÓN
    # Este bloque define cómo nginx sirve la aplicación Angular
    server {
        # Escuchar en el puerto 80 para tráfico HTTP
        listen 80;
        
        # Nombre del servidor para este host virtual
        # localhost se usa para desarrollo local
        server_name localhost;
        
        # Directorio raíz donde están ubicados los archivos de la aplicación
        # Aquí es donde se copian los archivos construidos de la aplicación Angular
        root /usr/share/nginx/html;
        
        # Archivo índice por defecto para servir al acceder al directorio raíz
        index index.html;

        # CABECERAS DE SEGURIDAD
        # Estas cabeceras ayudan a proteger contra vulnerabilidades web comunes
        
        # Prevenir ataques de clickjacking controlando la incrustación de frames
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # Habilitar protección XSS en navegadores
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Prevenir ataques de sniffing de tipo MIME
        add_header X-Content-Type-Options "nosniff" always;
        
        # Controlar información de referrer enviada a otros sitios
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        
        # Política de Seguridad de Contenido para prevenir XSS y otros ataques de inyección
        # Esta política permite contenido autohospedado y CDNs comunes
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # CONFIGURACIÓN DE RUTAS DE ANGULAR
        # Este bloque de ubicación maneja todas las peticiones y asegura que el enrutamiento de Angular funcione correctamente
        # La directiva try_files intenta servir archivos en orden, retrocediendo a index.html
        # Esto es esencial para SPAs de Angular donde el enrutamiento se maneja del lado del cliente
        location / {
            # Intentar servir el archivo exacto primero, luego el directorio, luego retroceder a index.html
            # Esto permite acceso directo a archivos estáticos mientras soporta el enrutamiento de Angular
            try_files $uri $uri/ /index.html;
        }

        # PROXY PARA API - Redirige las llamadas a /api al backend en el contenedor
        location /api/ {
            proxy_pass http://bookshop-springboot:8282;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CACHÉ DE RECURSOS ESTÁTICOS
        # Cachear recursos estáticos para mejor rendimiento y menor carga del servidor
        # Este bloque de ubicación coincide con extensiones comunes de archivos estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # Cachear estos archivos por 1 año ya que raramente cambian
            expires 1y;
            
            # Agregar cabeceras de control de caché para mejor comportamiento de caché
            # 'immutable' le dice a los navegadores que el archivo nunca cambiará
            add_header Cache-Control "public, immutable";
        }

        # CACHÉ DE ARCHIVOS HTML
        # Cachear archivos HTML por un período más corto ya que pueden cambiar más frecuentemente
        location ~* \.html$ {
            # Cachear archivos HTML por 1 hora
            expires 1h;
            
            # Agregar cabecera de control de caché para caché público
            add_header Cache-Control "public";
        }

        # ENDPOINT DE VERIFICACIÓN DE SALUD
        # Endpoint simple de verificación de salud para monitoreo y balanceadores de carga
        # Este endpoint devuelve una respuesta simple "healthy"
        location /health {
            # Deshabilitar log de acceso para verificaciones de salud para reducir ruido en logs
            access_log off;
            
            # Devolver una respuesta simple de estado de salud
            return 200 "healthy\n";
            
            # Establecer tipo de contenido para la respuesta
            add_header Content-Type text/plain;
        }
    }
} 